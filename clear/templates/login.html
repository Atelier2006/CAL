<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - キャリアセンター</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #b2e0ff; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; padding: 16px; }
        .card { background: #fff; width: 100%; max-width: 360px; padding: 28px 24px;
                border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.12); text-align: center; }
        h1 { font-size: 1.2rem; color: #1a608a; margin-bottom: 4px; }
        p.sub { font-size: .8rem; color: #666; margin-bottom: 20px; }
        .g_id_signin { display: flex; justify-content: center; margin: 12px 0; }
        hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
        .dev { text-align: left; }
        .dev label { font-size: .8rem; color: #555; display: block; margin-bottom: 6px; }
        select, button { width: 100%; padding: 11px; border-radius: 8px; font-size: 1rem; }
        select { border: 1px solid #ccc; background: #fafafa; }
        button { margin-top: 12px; border: none; background: #4ea9df; color: #fff; cursor: pointer; }
        button:hover { background: #3d97cc; }
        .note { font-size: .7rem; color: #999; margin-top: 14px; line-height: 1.5; }
        .admin-link { display: inline-block; margin-top: 16px; font-size: .8rem; color: #4ea9df; }
        #result { color: #dc143c; font-size: .85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>キャリアセンター</h1>
        <p class="sub">相談予約システム（学生）</p>

        <!-- 本番: 学校Googleアカウント (§6-6) -->
        <div id="g_id_onload"
             data-client_id="925030125877-fm67bqs95umiksc4kgne98tpkhvakjtb.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
        <div id="result"></div>

        <hr>
        <!-- 検証用DEVログイン(Google未設定でも動作確認可) -->
        <form class="dev" action="/dev-login" method="post">
            <label for="user_id">デモ用ログイン（学生を選択）</label>
            <select name="user_id" id="user_id">
                <option value="24AH9999">東京 電子 (24AH9999)</option>
                <option value="24AH1001">山田 太郎 (24AH1001)</option>
                <option value="24AB1003">佐藤 裕子 (24AB1003)</option>
                <option value="24AE1004">高橋 健太 (24AE1004)</option>
            </select>
            <button type="submit">ログイン</button>
        </form>

        <a class="admin-link" href="/admin-login">管理者の方はこちら ＞</a>
        <p class="note">※Google認証は学校ドメイン(*.stu.tokyo-ec.ac.jp)のみ許可。<br>
           デモ用ログインは動作検証のための簡易機能です。</p>
    </div>

    <script>
        async function handleCredentialResponse(response) {
            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();
            if (data.success) { location.href = data.redirect; }
            else { document.getElementById("result").textContent = data.message || "ログイン失敗"; }
        }
    </script>
</body>
</html>
